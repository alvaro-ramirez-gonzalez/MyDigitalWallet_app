<div class="custom-input-wrap">
  <label class="input-label" *ngIf="label">{{ label }}</label>

  <div class="input-wrapper" [class.error]="hasError">
    <ion-icon *ngIf="icon" [name]="icon" class="input-icon"></ion-icon>

    <input
      [type]="type"
      [placeholder]="placeholder"
      [value]="value"
      (input)="onInput($event)"
      (blur)="onBlur()"
      class="custom-input"
    />

    <ion-icon
      *ngIf="isPasswordType"
      [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
      class="input-icon-right"
      (click)="togglePassword()">
    </ion-icon>
  </div>

  <span class="error-text" *ngIf="hasError && errorMessage">
    {{ errorMessage }}
  </span>
</div>
